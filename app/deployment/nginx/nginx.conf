# =============================================================================
# PURE LINE — Reverse Proxy (edge nginx container)
# Routes public traffic to the internal docker-compose services.
#
# TLS STRATEGY: TLS is terminated at the Cloudflare edge via Cloudflare Tunnel
# (cloudflared). cloudflared connects OUTBOUND to Cloudflare and forwards to
# this nginx on plain HTTP (port 80) over the internal docker network — so we
# do NOT need local certificates and there are no inbound ports to open on the
# Windows host. This is the simplest, most secure option for a single-machine
# deployment (no port-forwarding, no cert renewal).
#
# ALTERNATIVE (local TLS termination): if you ever expose nginx directly to the
# internet instead of via cloudflared, uncomment the 443 server block below and
# mount real certs. Not needed for the default cloudflared setup.
# =============================================================================

upstream website           { server website:80; }
upstream chatbot_frontend  { server chatbot-frontend:80; }
upstream chatbot_backend   { server chatbot-backend:8000; }

server {
    listen 80;
    server_name _;

    client_max_body_size 10m;

    # ---- Backend API -> FastAPI ----
    # Generous timeouts: local LLM generation (esp. a cold Ollama model load)
    # can legitimately take 60-120s+ on modest hardware. Default 60s was
    # causing nginx to silently kill the connection mid-generation, which
    # showed up client-side as the chat UI hanging on "..." forever.
    location /api/ {
        proxy_pass http://chatbot_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # ---- Chatbot UI -> standalone chat frontend (served under /chat/) ----
    location /chat/ {
        proxy_pass http://chatbot_frontend/chat/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location = /chat { return 301 /chat/; }

    # ---- Admin -> handled by the website SPA (React Router /admin route) ----
    location /admin {
        proxy_pass http://website;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ---- Everything else -> marketing website ----
    location / {
        proxy_pass http://website;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

