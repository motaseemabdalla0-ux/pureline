# =============================================================================
# PURE LINE — full production stack (single Windows 11 host)
# Services: website, chatbot-frontend, chatbot-backend, db (postgres), nginx.
# Optional: cloudflared (profile "tunnel") for public HTTPS via Cloudflare.
#
# Bring up core stack:      docker compose up -d
# Bring up with tunnel:     docker compose --profile tunnel up -d
# =============================================================================
services:
  website:
    build:
      context: ../website
    image: pureline/website:latest
    restart: unless-stopped
    expose: ["80"]
    networks: [pureline]

  chatbot-frontend:
    build:
      context: ../chatbot/frontend
    image: pureline/chatbot-frontend:latest
    restart: unless-stopped
    expose: ["80"]
    networks: [pureline]

  chatbot-backend:
    build:
      context: ../chatbot/backend
    image: pureline/chatbot-backend:latest
    restart: unless-stopped
    expose: ["8000"]
    environment:
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - DATABASE_URL=postgresql://pureline:${POSTGRES_PASSWORD:-pureline}@db:5432/pureline
      # Local RAG: reach the Ollama service running on the Windows host.
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      # Leave blank to auto-select the best pulled model (qwen3:8b > qwen2.5:7b > ...).
      - OLLAMA_MODEL=${OLLAMA_MODEL:-}
      # Services Platform (requests/quotations/admin) - override in a .env
      # file for production, never commit real secrets.
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-pureline-admin-2026}
      - ADMIN_TOKEN_SECRET=${ADMIN_TOKEN_SECRET:-pureline-dev-secret-change-me}
      - UPLOAD_DIR=/app/data/uploads
    # Required so the container can resolve host.docker.internal on Linux engines.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Persist + expose the knowledge base and vector store to the host so the
      # user can drop documents in and the index survives restarts.
      - ../chatbot/backend/data/knowledge-base:/app/data/knowledge-base
      - ../chatbot/backend/data/chroma_db:/app/data/chroma_db
      - ../chatbot/backend/data/uploads:/app/data/uploads
    depends_on: [db]
    networks: [pureline]

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=pureline
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-pureline}
      - POSTGRES_DB=pureline
    volumes:
      - pgdata:/var/lib/postgresql/data
    expose: ["5432"]
    networks: [pureline]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pureline"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on: [website, chatbot-frontend, chatbot-backend]
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      # Exposed on the host so cloudflared (or a browser on the LAN) can reach it.
      - "8080:80"
    networks: [pureline]

  # -- Public HTTPS via Cloudflare Tunnel. Enabled with: --profile tunnel --
  # Terminates TLS at Cloudflare's edge; forwards to nginx on plain HTTP.
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    profiles: ["tunnel"]
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}
    depends_on: [nginx]
    networks: [pureline]

networks:
  pureline:
    driver: bridge

volumes:
  pgdata:
